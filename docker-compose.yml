version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: smart_parking_db
    environment:
      POSTGRES_USER: parking_user
      POSTGRES_PASSWORD: parking_password
      POSTGRES_DB: smart_parking
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U parking_user -d smart_parking"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - spms-network

  # Backend API Server
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: spms_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://parking_user:parking_password@postgres:5432/smart_parking
      PORT: 5000
      JWT_SECRET: your_super_secret_jwt_key_change_in_production_12345678
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: npm run dev
    networks:
      - spms-network

  # Frontend Development Server
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: spms_frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:5000/api
    command: npm run dev
    networks:
      - spms-network

networks:
  spms-network:
    driver: bridge

volumes:
  postgres_data:
    driver: local
